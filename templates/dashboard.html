{% extends 'base.html' %}

{% block content %}

<h2>Your Projects</h2>

<div class="project-list">
    {% for project in projects %}
    <div class="project-card" onclick="openProject({{ project.id }})">
        <h3>{{ project.name }}</h3>
        <p>{{ project.description }}</p>
    </div>
    {% endfor %}
</div>

<div id="taskInput" class="hidden">
    <input type="text" id="taskTitle" placeholder="New Task">
    <button onclick="addTask()">Add Task</button>
</div>

<div id="board" class="board hidden">

    <div class="column" data-status="TODO">
        <h3>To Do</h3>
        <div class="task-list" id="todo"></div>
    </div>

    <div class="column" data-status="IN_PROGRESS">
        <h3>In Progress</h3>
        <div class="task-list" id="inprogress"></div>
    </div>

    <div class="column" data-status="DONE">
        <h3>Done</h3>
        <div class="task-list" id="done"></div>
    </div>

</div>

{% endblock %}
